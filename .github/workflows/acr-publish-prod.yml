name: Build and push (prod)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/acr-publish-reusable.yml
    secrets: inherit
    with:
      acr_name: tribotwhisperxprod
      resource_group: TribotMainRG
      container_app_name: whisperx-asr-prod
      environment_label: prod
