name: Build and push to Azure Container Registry

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

env:
  ARM_USE_OIDC: true
  IMAGE_REPOSITORY: whisperx-asr-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment from branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ACR_NAME=tribotwhisperxprod" >> "$GITHUB_ENV"
            echo "RESOURCE_GROUP=TribotMainRG" >> "$GITHUB_ENV"
            echo "CONTAINER_APP_NAME=whisperx-asr-prod" >> "$GITHUB_ENV"
          else
            echo "ACR_NAME=tribotwhisperxdev" >> "$GITHUB_ENV"
            echo "RESOURCE_GROUP=TribotDevRG" >> "$GITHUB_ENV"
            echo "CONTAINER_APP_NAME=whisperx-asr-dev" >> "$GITHUB_ENV"
          fi
          echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image with ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
            --image "${IMAGE_REPOSITORY}:${{ github.sha }}" \
            --platform linux/amd64 \
            .

      - name: Update Container App to new image
        continue-on-error: true
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          if az containerapp show --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Updating $CONTAINER_APP_NAME to $IMAGE"
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$IMAGE"
          else
            echo "Container App $CONTAINER_APP_NAME not found yet — run Terraform apply first."
          fi
