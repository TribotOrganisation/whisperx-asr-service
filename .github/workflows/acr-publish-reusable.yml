name: ACR build and push (reusable)

on:
  workflow_call:
    inputs:
      acr_name:
        required: true
        type: string
      resource_group:
        required: true
        type: string
      container_app_name:
        required: true
        type: string
      environment_label:
        required: true
        type: string

env:
  ARM_USE_OIDC: true
  IMAGE_REPOSITORY: whisperx-asr-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image with ACR (${{ inputs.environment_label }})
        run: |
          az acr build \
            --registry "${{ inputs.acr_name }}" \
            --image "${IMAGE_REPOSITORY}:latest" \
            --image "${IMAGE_REPOSITORY}:${{ github.sha }}" \
            --platform linux/amd64 \
            .

      - name: Update Container App to new image (${{ inputs.environment_label }})
        continue-on-error: true
        run: |
          IMAGE="${{ inputs.acr_name }}.azurecr.io/${IMAGE_REPOSITORY}:latest"
          if az containerapp show \
            --name "${{ inputs.container_app_name }}" \
            --resource-group "${{ inputs.resource_group }}" >/dev/null 2>&1; then
            echo "Updating ${{ inputs.container_app_name }} to $IMAGE"
            az containerapp update \
              --name "${{ inputs.container_app_name }}" \
              --resource-group "${{ inputs.resource_group }}" \
              --image "$IMAGE"
          else
            echo "Container App ${{ inputs.container_app_name }} not found yet — run Terraform apply first."
          fi
